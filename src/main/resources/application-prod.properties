# ===============================
# Production Properties (Profile: prod)
# ===============================

# Native environment file import
spring.config.import=optional:file:.env.prod[.properties]

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Auth Service
app.auth-service.url=${APP_AUTH_SERVICE_URL}
app.auth-service.base-url=${APP_AUTH_SERVICE_BASE_URL}
app.auth-service.validate-token-endpoint=${APP_AUTH_VALIDATE_ENDPOINT}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# Admin Email
app.admin-email=${APP_ADMIN_EMAIL:support@chaitanyatechworld.com}

# Logging
logging.level.root=WARN
logging.level.com.job.portal=INFO

# Mail
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
