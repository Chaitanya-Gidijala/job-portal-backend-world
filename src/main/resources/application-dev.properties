# ===============================
# Development Properties (Profile: dev)
# ===============================

# Native environment file import
spring.config.import=optional:file:.env.dev[.properties]

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Auth Service
app.auth-service.url=${APP_AUTH_SERVICE_URL:http://localhost:8080}
app.auth-service.base-url=${APP_AUTH_SERVICE_BASE_URL:http://localhost:8080/api/auth}
app.auth-service.validate-token-endpoint=${APP_AUTH_VALIDATE_ENDPOINT:http://localhost:8080/api/auth/validate}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Admin Email
app.admin-email=${APP_ADMIN_EMAIL:gidijalachaitanya733@gmail.com}

# Logging
logging.level.root=INFO
logging.level.com.job.portal=DEBUG

# Mail (for testing in dev)
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
